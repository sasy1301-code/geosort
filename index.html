  const VEHICLE_STOCK_PER_PRODUCT = 50;
  const VEHICLE_STOCK_LOW_THRESHOLD = 10;

  function closeVehicleStockModal(){
    const overlay = document.getElementById('vehicleStockModalOverlay');
    if(overlay) overlay.remove();
  }

  function openVehicleStockModal(){
    closeVehicleStockModal();

    const overlay = document.createElement('div');
    overlay.id = 'vehicleStockModalOverlay';
    overlay.className = 'order-modal-overlay';
    overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeVehicleStockModal(); });

    const modal = document.createElement('div');
    modal.className = 'order-modal';
    overlay.appendChild(modal);

    modal.innerHTML = `
      <div class="order-modal-header">
        <h3>🚚 מלאי ברכב</h3>
        <button class="order-modal-close" title="סגור">✕</button>
      </div>
      <div class="order-modal-body">
        <div class="vehicle-stock-hint">המלאי רץ ברציפות ולא מתאפס לבד בכל יום - הוא יורד לפי כל הזמנה. אפשר לגעת במספר "מלאי נותר ברכב" ליד כל מוצר ולהקליד את הכמות שיש בפועל</div>
        <div class="inventory-list"></div>
      </div>
    `;

    modal.querySelector('.order-modal-close').addEventListener('click', closeVehicleStockModal);

    const listEl = modal.querySelector('.inventory-list');

    // total ever ordered for a product, across every client and every date (not
    // scoped to "today" - the running stock level depends on all-time history,
    // offset by whatever the last manually-set quantity captured)
    function getCumulativeOrderedQty(name){
      let total = 0;
      clients.forEach(c=>{
        (c.orders || []).forEach(o=>{
          if(!o.noOrder){
            (o.items || []).forEach(it=>{
              if(it.name === name) total += (it.qty || 0);
            });
          }
        });
      });
      return total;
    }

    // remaining stock for a product = the quantity set at its last anchor, minus
    // whatever has been ordered since that anchor was set. if no anchor was ever
    // set, default to a starting quantity of 50 counted from the very beginning
    function getRemaining(name){
      const cumulative = getCumulativeOrderedQty(name);
      const anchors = vehicleStockBaseline && vehicleStockBaseline.anchors ? vehicleStockBaseline.anchors : {};
      const anchor = anchors[name] || { qty: 50, cumulative: 0 };
      const usedSinceAnchor = Math.max(0, cumulative - anchor.cumulative);
      return { remaining: anchor.qty - usedSinceAnchor, usedSinceAnchor, anchorQty: anchor.qty };
    }

    function setProductQuantity(name, newQty){
      if(!vehicleStockBaseline || !vehicleStockBaseline.anchors) vehicleStockBaseline = { anchors: {} };
      vehicleStockBaseline.anchors[name] = { qty: newQty, cumulative: getCumulativeOrderedQty(name) };
      saveVehicleStockBaseline();
      refreshVehicleStock();
    }

    function refreshVehicleStock(){
      listEl.innerHTML = PRODUCT_CATALOG.map(cat => `
        <div class="order-cat">
          <div class="order-cat-title" data-open="0"><span class="order-cat-chevron" style="transform:rotate(0deg)">${CHEVRON_ICON_SVG}</span> ${escapeHtml(cat.title)}</div>
          <div class="order-cat-items" style="display:none">
            ${cat.items.map(name => {
              const { remaining, usedSinceAnchor, anchorQty } = getRemaining(name);
              const isLow = remaining <= VEHICLE_STOCK_LOW_THRESHOLD;
              const variant = name.startsWith(cat.prefix + " ") ? name.slice(cat.prefix.length + 1) : name;
              return `
                <div class="stock-row">
                  <div class="stock-name">
                    ${isLow ? `<span class="stock-low-dot" title="המלאי ברכב עומד להיגמר"></span>` : ""}
                    <span class="stock-name-block">
                      <span class="stock-name-prefix">${escapeHtml(cat.prefix)}</span>
                      <span class="stock-name-variant">${escapeHtml(variant)}</span>
                    </span>
                  </div>
                  <div class="stock-remaining">
                    <span class="stock-remaining-label">מלאי נותר ברכב:</span>
                    <span class="stock-remaining-value">
                      <input type="number" class="stock-qty-input ${isLow ? 'stock-low-text' : ''}" data-name="${escapeHtml(name)}" value="${remaining}" min="0" title="הקלידו את הכמות שיש בפועל ברכב ולחצו Enter">
                      מתוך ${anchorQty}
                    </span>
                  </div>
                  <div class="stock-complete-block">
                    <div class="stock-complete-label">ירד</div>
                    <div class="stock-complete-num">${usedSinceAnchor}</div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `).join('') + `
        <button class="reset-invoices-btn vehicle-stock-reset-btn">🔄 קבע 50 לכל המוצרים</button>
      `;
      listEl.querySelectorAll('.stock-qty-input').forEach(input=>{
        input.addEventListener('click', e=>e.stopPropagation());
        input.addEventListener('mousedown', e=>e.stopPropagation());
        function commit(){
          const name = input.dataset.name;
          const qty = parseInt(input.value, 10);
          if(isNaN(qty) || qty < 0) return; // ignore invalid input, leave as-is
          setProductQuantity(name, qty);
        }
        input.addEventListener('keydown', (e)=>{
          e.stopPropagation();
          if(e.key === 'Enter'){ e.preventDefault(); input.blur(); commit(); }
        });
        input.addEventListener('blur', commit);
      });
      listEl.querySelector('.vehicle-stock-reset-btn').addEventListener('click', ()=>{
        const ok = confirm("לקבוע 50 יחידות לכל המוצרים? זה יסמן שהרכב מולא מחדש עכשיו.");
        if(!ok) return;
        PRODUCT_CATALOG.forEach(cat=>{
          cat.items.forEach(name=>{
            vehicleStockBaseline.anchors[name] = { qty: 50, cumulative: getCumulativeOrderedQty(name) };
          });
        });
        saveVehicleStockBaseline();
        refreshVehicleStock();
      });
      listEl.querySelectorAll('.order-cat-title').forEach(titleEl=>{
        titleEl.addEventListener('click', ()=>{
          const itemsEl = titleEl.nextElementSibling;
          const chevron = titleEl.querySelector('.order-cat-chevron');
          const isOpen = itemsEl.style.display !== 'none';
          itemsEl.style.display = isOpen ? 'none' : 'block';
          chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
        });
      });
    }

    refreshVehicleStock();

    document.body.appendChild(overlay);
  }

  function openInventoryModal(){
    closeInventoryModal();
    const today = localDateString();

    const overlay = document.createElement('div');
    overlay.id = 'inventoryModalOverlay';
    overlay.className = 'order-modal-overlay';
    overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeInventoryModal(); });

    const modal = document.createElement('div');
    modal.className = 'order-modal';
    overlay.appendChild(modal);

    modal.innerHTML = `
      <div class="order-modal-header">
        <h3>📦 מלאי - סך הזמנות למוצר</h3>
        <button class="order-modal-close" title="סגור">✕</button>
      </div>
      <div class="order-modal-body">
        <div class="invoice-summary-range" style="justify-content:center;margin-bottom:14px">
          <input type="date" class="inventory-from" value="${today}">
          <span class="invoice-range-sep">עד</span>
          <input type="date" class="inventory-to" value="${today}">
        </div>
        <div class="inventory-list"></div>
      </div>
    `;

    modal.querySelector('.order-modal-close').addEventListener('click', closeInventoryModal);

    const fromInput = modal.querySelector('.inventory-from');
    const toInput = modal.querySelector('.inventory-to');
    const listEl = modal.querySelector('.inventory-list');

    function refreshInventory(){
      const fromDate = fromInput.value;
      const toDate = toInput.value;
      const totals = {}; // product name -> total qty
      clients.forEach(c=>{
        (c.orders || []).forEach(o=>{
          if(o.date >= fromDate && o.date <= toDate && !o.noOrder){
            (o.items || []).forEach(it=>{
              totals[it.name] = (totals[it.name] || 0) + (it.qty || 0);
            });
          }
        });
      });
      const grandTotal = Object.values(totals).reduce((sum, v) => sum + v, 0);
      listEl.innerHTML = PRODUCT_CATALOG.map(cat => `
        <div class="order-cat">
          <div class="order-cat-title" data-open="0"><span class="order-cat-chevron" style="transform:rotate(0deg)">${CHEVRON_ICON_SVG}</span> ${escapeHtml(cat.title)}</div>
          <div class="order-cat-items" style="display:none">
            ${cat.items.map(name => `
              <div class="inventory-row">
                <div class="inventory-name">${escapeHtml(name)}</div>
                <div class="inventory-qty">כמות הזמנות כללית: <b>${totals[name] || 0}</b></div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('') + `
        <div class="inventory-grand-total">סה״כ מוצרים: <b>${grandTotal}</b></div>
      `;
      listEl.querySelectorAll('.order-cat-title').forEach(titleEl=>{
        titleEl.addEventListener('click', ()=>{
          const itemsEl = titleEl.nextElementSibling;
          const chevron = titleEl.querySelector('.order-cat-chevron');
          const isOpen = itemsEl.style.display !== 'none';
          itemsEl.style.display = isOpen ? 'none' : 'block';
          chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
        });
      });
    }

    fromInput.addEventListener('change', refreshInventory);
    toInput.addEventListener('change', refreshInventory);
    refreshInventory();

    document.body.appendChild(overlay);
  }

  function closeOrderModal(){
    const overlay = document.getElementById('orderModalOverlay');
    if(overlay) overlay.remove();
    orderModalEditingId = null;
  }

  function openOrderModal(c){
    orderModalEditingId = null;
    closeOrderModal();
    const unitPrice = parseFloat(c.price) || 0;

    const overlay = document.createElement('div');
    overlay.id = 'orderModalOverlay';
    overlay.className = 'order-modal-overlay';
    overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeOrderModal(); });

    const modal = document.createElement('div');
    modal.className = 'order-modal';
    overlay.appendChild(modal);

    function itemKey(name){ return name.replace(/[^א-תa-zA-Z0-9]/g,'_'); }

    function renderForm(prefillItems, prefillNoOrder, prefillReason, prefillDiscount){
      const prefillMap = {};
      (prefillItems || []).forEach(it => { prefillMap[it.name] = it.qty; });

      modal.innerHTML = `
        <div class="order-modal-header">
          <h3>${c.business ? escapeHtml(c.business) : escapeHtml(c.name)} — הזמנה</h3>
          <button class="order-modal-close" title="סגור">✕</button>
        </div>
        <div class="order-modal-body">
          ${PRODUCT_CATALOG.map(cat => {
            const hasPrefill = cat.items.some(name => prefillMap[name]);
            return `
            <div class="order-cat">
              <div class="order-cat-title" data-open="${hasPrefill ? '1' : '0'}">
                <span class="order-cat-chevron" style="transform:rotate(${hasPrefill ? 90 : 0}deg)">${CHEVRON_ICON_SVG}</span> ${escapeHtml(cat.title)}
              </div>
              <div class="order-cat-items" style="display:${hasPrefill ? 'block' : 'none'}">
                ${cat.items.map(name => {
                  const key = itemKey(name);
                  const qty = prefillMap[name] || '';
                  return `
                    <div class="order-item-row">
                      <label class="order-item-check">
                        <input type="checkbox" data-item="${escapeHtml(name)}" class="order-item-checkbox" id="oi_${key}" ${qty ? 'checked' : ''}>
                        ${escapeHtml(name)}
                      </label>
                      <span class="order-item-qty-label">כמות:</span>
                      <input type="number" min="0" step="1" class="order-item-qty" data-item="${escapeHtml(name)}" value="${qty}">
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;}).join('')}
          <div class="no-order-row">
            <label>
              <input type="checkbox" class="no-order-checkbox" ${prefillNoOrder ? 'checked' : ''}>
              לא בוצעה הזמנה (ביקור בלי הזמנה - יישמר סכום 0 לתאריך הזה)
            </label>
            <div class="no-order-reason-wrap" style="display:${prefillNoOrder ? 'block' : 'none'}">
              <label class="no-order-reason-label">מה הסיבה שלא בוצעה הזמנה?</label>
              <input type="text" class="no-order-reason" placeholder="למשל: הלקוח לא היה זמין, אין מלאי אצל הלקוח..." value="${escapeHtml(prefillReason||'')}">
            </div>
          </div>
          <div class="order-discount-row">
            <label>הנחה (%)</label>
            <input type="number" min="0" max="100" step="0.1" class="order-discount-input" value="${escapeHtml((prefillDiscount !== undefined && prefillDiscount !== null) ? prefillDiscount : (c.discountPercent || ''))}" placeholder="0">
          </div>
          <div class="order-total-row">
            סה״כ (לפי ₪${unitPrice.toFixed(2)} ליחידה): <b class="order-total-amount">₪0.00</b>
          </div>
          <button class="order-save-btn">💾 שמור הזמנה${orderModalEditingId ? ' (עדכון)' : ''}</button>
        </div>
        <div class="order-history">
          <div class="order-history-title"><span class="order-history-chevron" style="transform:rotate(0deg)">${CHEVRON_ICON_SVG}</span> היסטוריית הזמנות</div>
          <div class="order-history-list" style="display:none"></div>
        </div>
      `;

      modal.querySelector('.order-modal-close').addEventListener('click', closeOrderModal);

      modal.querySelectorAll('.order-cat-title').forEach(titleEl=>{
        titleEl.addEventListener('click', ()=>{
          const itemsEl = titleEl.nextElementSibling;
          const chevron = titleEl.querySelector('.order-cat-chevron');
          const isOpen = itemsEl.style.display !== 'none';
          itemsEl.style.display = isOpen ? 'none' : 'block';
          chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
        });
      });

      modal.querySelector('.order-history-title').addEventListener('click', ()=>{
        const listEl = modal.querySelector('.order-history-list');
        const chevron = modal.querySelector('.order-history-chevron');
        const isOpen = listEl.style.display !== 'none';
        listEl.style.display = isOpen ? 'none' : 'block';
        chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
      });

      const noOrderCheckbox = modal.querySelector('.no-order-checkbox');
      const noOrderReasonWrap = modal.querySelector('.no-order-reason-wrap');
      const catInputs = modal.querySelectorAll('.order-cat input');
      if(prefillNoOrder) catInputs.forEach(el=>{ el.disabled = true; });
      noOrderCheckbox.addEventListener('change', ()=>{
        catInputs.forEach(el=>{ el.disabled = noOrderCheckbox.checked; });
        noOrderReasonWrap.style.display = noOrderCheckbox.checked ? 'block' : 'none';
        recalcTotal();
      });

      const discountInput = modal.querySelector('.order-discount-input');
      function recalcTotal(){
        if(noOrderCheckbox.checked){
          modal.querySelector('.order-total-amount').textContent = `₪0.00`;
          return;
        }
        let subtotal = 0;
        modal.querySelectorAll('.order-item-checkbox').forEach(cb=>{
          if(cb.checked){
            const qtyInput = modal.querySelector(`.order-item-qty[data-item="${CSS.escape(cb.dataset.item)}"]`);
            const qty = parseFloat(qtyInput.value) || 0;
            subtotal += qty * unitPrice;
          }
        });
        const discountPct = Math.min(100, Math.max(0, parseFloat(discountInput.value) || 0));
        const total = subtotal * (1 - discountPct / 100);
        modal.querySelector('.order-total-amount').textContent = `₪${total.toFixed(2)}`;
      }
      discountInput.addEventListener('input', recalcTotal);
      modal.querySelectorAll('.order-item-checkbox, .order-item-qty').forEach(el=>{
        el.addEventListener('input', recalcTotal);
        el.addEventListener('change', recalcTotal);
      });
      recalcTotal();

      modal.querySelector('.order-save-btn').addEventListener('click', (e)=>{
        const saveBtn = e.currentTarget;
        if(saveBtn.disabled) return; // guards against a rapid double-click creating a duplicate order
        const noOrder = noOrderCheckbox.checked;
        let items = [];
        let noOrderReason = "";
        if(!noOrder){
          modal.querySelectorAll('.order-item-checkbox').forEach(cb=>{
            if(cb.checked){
              const qtyInput = modal.querySelector(`.order-item-qty[data-item="${CSS.escape(cb.dataset.item)}"]`);
              const qty = parseFloat(qtyInput.value) || 0;
              if(qty > 0) items.push({ name: cb.dataset.item, qty });
            }
          });
          if(items.length === 0){
            alert('יש לבחור לפחות מוצר אחד עם כמות גדולה מ-0, או לסמן "לא בוצעה הזמנה".');
            return;
          }
        } else {
          noOrderReason = modal.querySelector('.no-order-reason').value.trim();
          if(!noOrderReason){
            alert('יש לרשום את הסיבה שלא בוצעה הזמנה.');
            return;
          }
        }
        saveBtn.disabled = true;
        const discountPct = Math.min(100, Math.max(0, parseFloat(modal.querySelector('.order-discount-input').value) || 0));
        const subtotal = noOrder ? 0 : items.reduce((sum,it)=> sum + it.qty * unitPrice, 0);
        const total = subtotal * (1 - discountPct / 100);
        c.discountPercent = discountPct || "";
        c.orders = c.orders || [];
        if(orderModalEditingId){
          const existing = c.orders.find(o => o.id === orderModalEditingId);
          if(existing){
            existing.items = items;
            existing.total = total;
            existing.discountPercent = discountPct;
            existing.date = localDateString();
            existing.noOrder = noOrder;
            existing.noOrderReason = noOrderReason;
          }
        } else {
          c.orders.push({
            id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
            date: localDateString(),
            items, total, discountPercent: discountPct, noOrder, noOrderReason
          });
        }
        // the order's total becomes this client's "last invoice amount" too, dated today
        c.lastInvoice = total.toFixed(2);
        c.lastInvoiceDate = localDateString();
        saveData();
        orderModalEditingId = null;
        renderForm(null);
        renderHistory();
        renderAll();
      });

      renderHistory();
    }

    function renderHistory(){
      const listEl = modal.querySelector('.order-history-list');
      const orders = (c.orders || []).slice().sort((a,b)=> b.date.localeCompare(a.date));
      if(orders.length === 0){
        listEl.innerHTML = `<div class="empty" style="padding:6px 2px">אין עדיין הזמנות שמורות ללקוח הזה.</div>`;
        return;
      }
      listEl.innerHTML = orders.map(o => `
        <div class="order-history-row" data-order-id="${o.id}">
          <div class="order-history-info">
            <div class="order-history-date">${o.date}</div>
            <div class="order-history-items">${o.noOrder ? `<i>לא בוצעה הזמנה${o.noOrderReason ? ` - ${escapeHtml(o.noOrderReason)}` : ''}</i>` : (o.items || []).map(it=>`${escapeHtml(it.name||'')} ×${it.qty||0}`).join(', ')}${o.discountPercent ? ` <span style="color:var(--gold)">(הנחה ${o.discountPercent}%)</span>` : ''}</div>
          </div>
          <div class="order-history-total">₪${o.total.toFixed(2)}</div>
          <div class="order-history-actions">
            <button class="order-edit-btn" data-order-id="${o.id}" title="עריכה">✎</button>
            <button class="order-del-btn" data-order-id="${o.id}" title="מחיקה">🗑</button>
          </div>
        </div>
      `).join('');

      listEl.querySelectorAll('.order-edit-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const order = (c.orders||[]).find(o => o.id === btn.dataset.orderId);
          if(!order) return;
          orderModalEditingId = order.id;
          renderForm(order.items, order.noOrder, order.noOrderReason, order.discountPercent);
        });
      });
      listEl.querySelectorAll('.order-del-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          if(!confirm('למחוק את ההזמנה הזו? לא ניתן לשחזר.')) return;
          recentlyDeletedOrderIds.add(btn.dataset.orderId); // guard against the merge-safe save resurrecting it
          c.orders = (c.orders||[]).filter(o => o.id !== btn.dataset.orderId);
          saveData();
          renderHistory();
        });
      });
    }

    renderForm(null);
    document.body.appendChild(overlay);
  }


  // splits a stored address label like "הרצל 12, תל אביב" back into a street+number
  // part and a city part, so the edit form can be pre-filled with them separately.
  function splitAddressForEdit(c){
    const addr = c.address || '';
    const idx = addr.lastIndexOf(',');
    let streetParam = idx >= 0 ? addr.slice(0, idx).trim() : addr.trim();
    const cityFromAddr = idx >= 0 ? addr.slice(idx+1).trim() : '';
    // if we know the house number separately, strip it back out of the street text so
    // editing shows just the street name again (matching how adding a new address works)
    if(c.houseNumber && streetParam.endsWith(c.houseNumber)){
      streetParam = streetParam.slice(0, streetParam.length - c.houseNumber.length).trim();
    }
    return { streetParam, city: c.city || cityFromAddr };
  }

      <textarea class="edit-whatsapp-msg">${escapeHtml(c.whatsappMessage||'')}</textarea>

        <input type="text" class="edit-update-input" placeholder="עדכון חדש (יתווסף עם תאריך היום)">
        <button class="edit-update-add-btn" type="button">+ הוסף</button>

    function renderEditUpdates(){

      if(updates.length === 0){

          saveData();
          renderEditUpdates();
        });
      });
    }
    renderEditUpdates();

    card.querySelector('.edit-update-add-btn').addEventListener('click', (e)=>{
      e.stopPropagation();
      const input = card.querySelector('.edit-update-input');

      saveData();
      input.value = '';
      renderEditUpdates();
    });
    card.querySelector('.edit-update-input').addEventListener('click', e=>e.stopPropagation());
    card.querySelector('.edit-update-input').addEventListener('keydown', (e)=>{
      e.stopPropagation();
      if(e.key === 'Enter'){ e.preventDefault(); card.querySelector('.edit-update-add-btn').click(); }
    });

    card.querySelector('.cancel-edit').addEventListener('click', (e)=>{
      e.stopPropagation();
      editingClientId = null;
      renderAll();
    });

    function applyNonAddressFields(){
      c.business = card.querySelector('.edit-business').value.trim();
      c.businessId = card.querySelector('.edit-businessid').value.trim();
      c.name = card.querySelector('.edit-name').value.trim();
      c.contact = card.querySelector('.edit-contact').value.trim();
      c.phone = card.querySelector('.edit-phone').value.trim();
      c.email = card.querySelector('.edit-email').value.trim();
      c.price = card.querySelector('.edit-price').value.trim();
      c.notes = card.querySelector('.edit-notes').value.trim();
      c.whatsappMessage = card.querySelector('.edit-whatsapp-msg').value.trim();
    }

    function finishSave(){
      editingClientId = null;
      saveData();
      renderAll();
    }

    function showAddrOptions(results, newHouseNumber){
      const box = card.querySelector('.edit-addr-suggestions');
      box.innerHTML = results.map((r, i) =>
        `<button type="button" class="edit-addr-option" data-i="${i}" style="display:block;width:100%;text-align:right;margin-bottom:4px;font-size:.78rem;padding:6px 8px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;border-radius:6px;cursor:pointer">${escapeHtml(r.label)}</button>`
      ).join('');
      box.style.display = 'block';
      box.querySelectorAll('.edit-addr-option').forEach(btn=>{
        btn.addEventListener('click', (e)=>{
          e.stopPropagation();
          const r = results[parseInt(btn.dataset.i, 10)];
          applyNonAddressFields();
          c.houseNumber = newHouseNumber;
          c.address = insertHouseNumber(r.label, newHouseNumber); c.lat = r.lat; c.lon = r.lon; c.city = r.city;
          finishSave();
        });
      });
    }

    card.querySelector('.save-edit').addEventListener('click', async (e)=>{
      e.stopPropagation();
      const business = card.querySelector('.edit-business').value.trim();
      const errEl = card.querySelector('.edit-error');
      errEl.style.display = 'none';
      card.querySelector('.edit-addr-suggestions').style.display = 'none';
      if(!business){
        errEl.textContent = "שם העסק הוא שדה חובה.";
        errEl.style.display = 'block';
        return;
      }
      const newStreetParam = card.querySelector('.edit-street').value.trim();
      const newCity = card.querySelector('.edit-city').value.trim();
      const newHouseNumber = card.querySelector('.edit-housenum').value.trim();
      const origHouseNumber = c.houseNumber || "";
      const addressChanged = (newStreetParam !== origStreetParam) || (newCity !== origCity) || (newHouseNumber !== origHouseNumber);

      if(!addressChanged){
        // literally nothing address-related changed - no need for a network lookup
        applyNonAddressFields();
        finishSave();
        return;
      }

      if(!newStreetParam && !newCity){
        errEl.textContent = "יש למלא רחוב או עיר.";
        errEl.style.display = 'block';
        return;
      }

      const searchStreetParam = [newStreetParam, newHouseNumber].filter(Boolean).join(" ");
      const saveBtn = card.querySelector('.save-edit');
      saveBtn.disabled = true;
      saveBtn.textContent = "מאתר כתובת...";
      try{
        const results = await geocodeFields(searchStreetParam, newCity, 8);
        if(results.length === 0){
          errEl.textContent = "לא נמצאה כתובת מתאימה - בדקו את הכתיב של הרחוב והעיר.";
          errEl.style.display = 'block';
        } else if(results.length === 1){
          applyNonAddressFields();
          c.houseNumber = newHouseNumber;
          c.address = insertHouseNumber(results[0].label, newHouseNumber); c.lat = results[0].lat; c.lon = results[0].lon; c.city = results[0].city;
          finishSave();
        } else {
          errEl.textContent = "נמצאו כמה כתובות מתאימות - בחרו את הנכונה מהרשימה:";
          errEl.style.display = 'block';
          showAddrOptions(results, newHouseNumber);
        }
      }catch(err){
        errEl.textContent = "שגיאה באיתור הכתובת. בדקו את החיבור לאינטרנט ונסו שוב.";
        errEl.style.display = 'block';
      }finally{
        saveBtn.disabled = false;
        saveBtn.textContent = "💾 שמור";
      }
    });
    return card;
  }

  function buildClientCard(c, routeNumber, moveHandlers, showSkipToggle, isTempContext){

    const stopColor = c.stopColor || colorForName(c.id);
    const isCardOpen = openClientCards.has(c.id);
    card.innerHTML = `

          <button type="button" class="more-opt-inactive">${c.inactive ? statusCircleIconSvg('#0da255') + ' החזר לפעיל' : statusCircleIconSvg('#e92a2e') + ' לקוח לא פעיל'}</button>
          <button type="button" class="more-opt-delete">${DELETE_ICON_SVG} מחיקת כרטיס לקוח</button>
        `;

        menu.querySelector('.more-opt-share').addEventListener('click', ()=>{
          menu.remove();

        });
        menu.querySelector('.more-opt-photo').addEventListener('click', ()=>{
          menu.remove();
          if(photoUploadInput) photoUploadInput.click();
        });
        menu.querySelector('.more-opt-inactive').addEventListener('click', ()=>{
          menu.remove();
          c.inactive = !c.inactive;
          saveData();
          renderAll();
        });
        menu.querySelector('.more-opt-delete').addEventListener('click', ()=>{
          menu.remove();
          const ok = confirm(`למחוק את "${c.business || c.name || 'הלקוח'}"? לא ניתן לשחזר את זה.`);
          if(!ok) return;
          deleteClient(c.id);

      saveData();

    const collectPaymentBtn = card.querySelector('.toggle-collect-payment');

      c.collectPayment = !c.collectPayment;
      saveData();
      renderAll();
    });
    const handledCheckbox = card.querySelector('.handled-checkbox');
    handledCheckbox.addEventListener('click', e=>e.stopPropagation());
    handledCheckbox.addEventListener('change', (e)=>{
      c.handled = e.target.checked;
      c.handledAt = c.handled ? Date.now() : null;
      saveData();
      // let the knob's slide/color transition play out first - a renderAll() right away
      // would rebuild the DOM before the animation gets a chance to show
      setTimeout(renderAll, 220);

    const invoiceInput = card.querySelector('.last-invoice-input');
    if(invoiceInput){
      invoiceInput.addEventListener('click', e=>e.stopPropagation());
      invoiceInput.addEventListener('change', (e)=>{

    const skipBtn = card.querySelector('.toggle-skip');

        renderAll();
      });
    }
    const colorInput = card.querySelector('.stop-color-input');
    if(colorInput){
      colorInput.addEventListener('click', e=>e.stopPropagation());
      colorInput.addEventListener('change', (e)=>{
        c.stopColor = e.target.value;
        saveData();
        renderAll();
      });

    const moveSel = card.querySelector('.move-select');
    moveSel.innerHTML = '<option value="">— בלי תיקייה —</option>' +
      folders.map(f=>`<option value="${escapeHtml(f.name)}">${escapeHtml(f.name)}</option>`).join('');
    moveSel.value = c.folder || '';
    moveSel.addEventListener('click', e=>e.stopPropagation());
    moveSel.addEventListener('change', (e)=>{
      c.folder = e.target.value;
      saveData();
      renderAll();
    });
    if(isTempContext){
      const removeTempBtn = document.createElement('button');
      removeTempBtn.className = 'remove-temp-btn';
      removeTempBtn.textContent = '✕ הסר מהיום הזה';
      removeTempBtn.title = 'הסרה מהתיקייה הזמנית הזו - הכתובת תישאר בתיקייה הראשית שלה';
      card.querySelector('.temp-folder-badge').appendChild(removeTempBtn);
      removeTempBtn.addEventListener('click', (e)=>{

        c.tempFolder = "";
        saveData();
        renderAll();
      });
    } else {
      const tempSel = card.querySelector('.temp-folder-select');
      tempSel.innerHTML = '<option value="">— אין —</option>' +
        folders.filter(f=>f.name !== (c.folder||'')).map(f=>`<option value="${escapeHtml(f.name)}">${escapeHtml(f.name)}</option>`).join('');
      tempSel.value = c.tempFolder || '';
      tempSel.addEventListener('click', e=>e.stopPropagation());
      tempSel.addEventListener('change', (e)=>{

        saveData();

      });
    }
    if(moveHandlers){

      if(posInput){
        posInput.addEventListener('click', e=>e.stopPropagation());
        posInput.addEventListener('mousedown', e=>e.stopPropagation());
        posInput.addEventListener('keydown', (e)=>{
          e.stopPropagation();
          if(e.key === 'Enter'){ e.target.blur(); }
        });
        posInput.addEventListener('change', (e)=>{
          const val = parseInt(e.target.value, 10);
          if(!isNaN(val)) moveHandlers.moveTo(val);
        });
      }
    }
    card.querySelector('.edit-client').addEventListener('click', (e)=>{

      editingClientId = c.id;
      renderAll();
    });
    card.querySelector('.focus').addEventListener('click', (e)=>{
      e.stopPropagation();
      map.setView([c.lat, c.lon], 15);
      markersLayer.eachLayer(mk=>{

        if(Math.abs(ll.lat-c.lat)<1e-6 && Math.abs(ll.lng-c.lon)<1e-6){ mk.openPopup(); }
      });

    card.querySelector('.open-order').addEventListener('click', (e)=>{
      e.stopPropagation();
      try{
        openOrderModal(c);
      }catch(err){
        console.error('order modal error for client', c.id, c.business, err);
        alert('שגיאה בפתיחת הזמנות עבור "' + (c.business || c.name || '') + '": ' + err.message);
      }
    });
    return card;

  function startClusterRename(headEl, cl){
    const nameEl = headEl.querySelector('.name');
    const current = cl.name;
    const input = document.createElement('input');
    input.type = 'text';
    input.value = current;
    input.className = 'cluster-rename-input';
    nameEl.replaceWith(input);
    input.focus();
    input.select();

    let done = false;
    function commit(){
      if(done) return;
      done = true;
      renameCluster(cl.key, input.value);
    }
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ commit(); }
      if(e.key === 'Escape'){ done = true; renderAll(); }
    });
    input.addEventListener('blur', commit);
    input.addEventListener('click', e=>e.stopPropagation());
  }

  function startFolderRename(headEl, folder){
    const nameEl = headEl.querySelector('.name');
    const input = document.createElement('input');
    input.type = 'text';
    input.value = folder.name;
    input.className = 'cluster-rename-input';
    nameEl.replaceWith(input);
    input.focus();
    input.select();

    let done = false;
    function commit(){
      if(done) return;
      done = true;
      renameFolder(folder, input.value);
    }
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ commit(); }
      if(e.key === 'Escape'){ done = true; renderAll(); }
    });
    input.addEventListener('blur', commit);
    input.addEventListener('click', e=>e.stopPropagation());
  }

  function renderSidebar(){
    const listEl = document.getElementById('clusterList');
    listEl.innerHTML = "";

    if(clients.length === 0){
      listEl.innerHTML = `<div class="empty">אין עדיין לקוחות. הוסיפו כתובת ראשונה כדי לראות אזורים.</div>`;
      return;
    }

    let anyVisible = false;

    clusters.forEach((cl, cIdx)=>{
      const filteredMembers = cl.members;
      if(filteredMembers.length === 0) return;
      anyVisible = true;

      const isCustomName = !!clusterNames[cl.key];
      const inRouteMode = routeModeKeys.has(cl.key);

      const group = document.createElement('div');
      group.className = 'cluster-group';

      const head = document.createElement('div');
      head.className = 'cluster-head';
      head.innerHTML = `
        <div class="cluster-swatch" style="background:${cl.color}"></div>
        <div class="name" title="${isCustomName ? 'שם מותאם אישית' : ''}">${escapeHtml(cl.name)}</div>
        <div class="count">${filteredMembers.length}</div>
        <button class="route-toggle ${inRouteMode ? 'active' : ''}" title="סידור הכתובות לפי מסלול נסיעה יעיל">🧭</button>
        <button class="rename-cluster" title="שינוי שם האזור">✎</button>
        ${isCustomName ? '<button class="reset-cluster-name" title="חזרה לשם האוטומטי">↺</button>' : ''}
      `;
      head.addEventListener('click', (e)=>{
        if(e.target.closest('.rename-cluster') || e.target.closest('.reset-cluster-name') || e.target.closest('.route-toggle')) return;
        toggleClusterOpen(cl.key);
        body.style.display = openClusterNames.has(cl.key) ? 'block' : 'none';
        const bounds = filteredMembers.map(m=>[clients[m].lat, clients[m].lon]);
        fitOrCenter(bounds, 14, 40);
      });
      head.querySelector('.rename-cluster').addEventListener('click', (e)=>{
        e.stopPropagation();
        startClusterRename(head, cl);
      });
      head.querySelector('.route-toggle').addEventListener('click', (e)=>{
        e.stopPropagation();
        toggleRouteMode(cl.key);
        openClusterNames.add(cl.key); // open the group so the order is visible right away
        renderAll();
      });
      const resetBtn = head.querySelector('.reset-cluster-name');
      if(resetBtn){
        resetBtn.addEventListener('click', (e)=>{
          e.stopPropagation();
          renameCluster(cl.key, "");
        });
      }

      const body = document.createElement('div');
      body.className = 'cluster-body cluster-region-body';
      body.style.display = openClusterNames.has(cl.key) ? 'block' : 'none';
      const activeMembers = filteredMembers.filter(m => !clients[m].skipRoute);
      const skippedMembers = filteredMembers.filter(m => clients[m].skipRoute);
      const orderedMembers = sinkInactiveToEnd(getOrderedClusterMembers(cl, activeMembers), i => clients[i].inactive); // full list, for display/position
      const calcMembers = orderedMembers.filter(m => !clients[m].handled); // for route distance/time only
      const calcPosOf = {};
      calcMembers.forEach((m, i)=>{ calcPosOf[clients[m].id] = i; });
      const cachedClusterRoad = clusterRoadRouteCache[cl.key];
      const clusterRoadMatches = cachedClusterRoad && cachedClusterRoad.fingerprint === routeFingerprint(calcMembers.map(m=>clients[m]));

      if(inRouteMode && calcMembers.length > 1){
        let totalKm, totalDriveMin, isReal;
        if(clusterRoadMatches){
          totalKm = cachedClusterRoad.totalKm; totalDriveMin = cachedClusterRoad.totalMin; isReal = true;
        } else {
          totalKm = 0; totalDriveMin = 0; isReal = false;
          for(let i=0; i<calcMembers.length-1; i++){
            const leg = estimateLeg(clients[calcMembers[i]], clients[calcMembers[i+1]]);
            totalKm += leg.km;
            totalDriveMin += leg.minutes;
          }
        }
        const totalServiceMin = calcMembers.length * STOP_SERVICE_MINUTES;
        const totalMin = totalDriveMin + totalServiceMin;
        const summary = document.createElement('div');
        summary.className = 'route-summary';
        summary.title = (isReal
          ? "מרחק אמיתי על פי הכביש (מקור: OSRM), זמן מחושב לפי 20 קמ״ש בגלל עומסים"
          : "מאתר את המסלול בפועל על פי הכביש... (מציג הערכה בקו אווירי בינתיים)")
          + ` + ${STOP_SERVICE_MINUTES} דק׳ טיפול בכל כתובת (${calcMembers.length} כתובות)`;
        const excludedCount = (skippedMembers.length) + (orderedMembers.length - calcMembers.length);
        summary.innerHTML = `🚗 סה״כ מסלול: <b>${totalKm.toFixed(1)} ק״מ</b> · ${formatDuration(totalDriveMin)} נסיעה + ${formatDuration(totalServiceMin)} טיפול (${calcMembers.length}×${STOP_SERVICE_MINUTES} דק׳) = <b>${formatDuration(totalMin)}</b>${isReal ? '' : ' <span style="opacity:.7">(הערכה, מאתר מסלול מדויק...)</span>'}${excludedCount ? ` <span style="opacity:.7">· ${excludedCount} כתובות מדולגות/טופלו, לא נכללות</span>` : ''}`;
        body.appendChild(summary);
      }

      const activeListEl = document.createElement('div');
      body.appendChild(activeListEl);

      orderedMembers.forEach((m, idx)=>{
        const moveHandlers = {
          isFirst: idx === 0,
          isLast: idx === orderedMembers.length - 1,
          total: orderedMembers.length,
          up: () => moveClusterMember(cl, activeMembers, clients[m].id, -1, skippedMembers),
          down: () => moveClusterMember(cl, activeMembers, clients[m].id, 1, skippedMembers),
          moveTo: (pos) => moveClusterMemberToPosition(cl, activeMembers, clients[m].id, pos, skippedMembers)
        };
        const cardEl = buildClientCard(clients[m], idx+1, moveHandlers, true);
        if(idx % 2 === 1) cardEl.classList.add('card-alt');
        activeListEl.appendChild(cardEl);
        if(idx < orderedMembers.length - 1){
          const curClient = clients[m], nextClient = clients[orderedMembers[idx+1]];
          if(!curClient.handled && !nextClient.handled){
            const curCalcPos = calcPosOf[curClient.id];
            const realLeg = (clusterRoadMatches && cachedClusterRoad.legs[curCalcPos]) ? cachedClusterRoad.legs[curCalcPos] : null;
            activeListEl.appendChild(buildLegConnector(curClient, nextClient, realLeg));
          }
        }
      });

      if(skippedMembers.length){
        const skipHeader = document.createElement('div');
        skipHeader.style.cssText = 'font-size:.72rem;color:rgba(255,255,255,.5);margin:10px 0 4px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.18)';
        skipHeader.textContent = `⏸ לא במסלול היום (${skippedMembers.length})`;
        body.appendChild(skipHeader);
        skippedMembers.forEach(m=>{
          body.appendChild(buildClientCard(clients[m], null, null, true));
        });
      }

      wireDragReorder(activeListEl, (ids)=>{
        const folder = dominantFolderFor(filteredMembers);
        if(folder){
          folder.order = ids.concat(skippedMembers.map(m => clients[m].id));
          saveFolders();
        } else {
          clusterOrder[cl.key] = ids;
          saveClusterOrder();
        }
        renderAll();
      });

      group.appendChild(head);
      group.appendChild(body);
      listEl.appendChild(group);
    });

    if(!anyVisible){
      listEl.innerHTML = `<div class="empty">לא נמצאו לקוחות התואמים לחיפוש.</div>`;
    }
  }

  let grandSummaryFromDate = null; // remembers the chosen date range across re-renders
  let grandSummaryToDate = null;

  function renderGrandInvoiceSummary(){
    const container = document.getElementById('grandInvoiceSummary');
    if(clients.length === 0){ container.innerHTML = ""; return; }
    const today = localDateString();
    if(!grandSummaryFromDate) grandSummaryFromDate = today;
    if(!grandSummaryToDate) grandSummaryToDate = today;
    container.innerHTML = `
      <div class="invoice-summary grand" style="margin-top:12px">
        <div class="invoice-summary-range">
          <input type="date" class="grand-invoice-from" value="${grandSummaryFromDate}">
          <span class="invoice-range-sep">עד</span>
          <input type="date" class="grand-invoice-to" value="${grandSummaryToDate}">
        </div>
        <div class="invoice-summary-total">סה״כ כל התיקיות: <b>₪0</b></div>
      </div>
      <button class="send-daily-report-btn">📤 שליחת דו״ח יומי</button>
      <button class="reset-invoices-btn" title="מאפס לכולם, לא ניתן לשחזר">🗑 אפס את כל הסכומים ל-0</button>
    `;
    const fromInput = container.querySelector('.grand-invoice-from');
    const toInput = container.querySelector('.grand-invoice-to');
    const totalEl = container.querySelector('.invoice-summary-total b');
    fromInput.addEventListener('click', e=>e.stopPropagation());
    toInput.addEventListener('click', e=>e.stopPropagation());
    function refresh(){
      grandSummaryFromDate = fromInput.value;
      grandSummaryToDate = toInput.value;
      const total = clients.reduce((sum, c)=>{
        if(c.lastInvoiceDate && c.lastInvoiceDate >= grandSummaryFromDate && c.lastInvoiceDate <= grandSummaryToDate){
          const val = parseFloat(c.lastInvoice);
          if(!isNaN(val)) return sum + val;
        }
        return sum;
      }, 0);
      totalEl.textContent = `₪${total.toFixed(2)}`;
    }
    fromInput.addEventListener('change', refresh);
    toInput.addEventListener('change', refresh);
    refresh();

    container.querySelector('.reset-invoices-btn').addEventListener('click', ()=>{
      const ok = confirm("לאפס את סכום החשבונית האחרונה של כל הלקוחות ל-0? לא ניתן לשחזר את זה.");
      if(!ok) return;
      clients.forEach(c=>{ c.lastInvoice = ""; c.lastInvoiceDate = ""; });
      saveData();
      renderAll();
    });

    container.querySelector('.send-daily-report-btn').addEventListener('click', ()=>{
      const fromDate = grandSummaryFromDate;
      const toDate = grandSummaryToDate;
      let orderCount = 0;
      let total = 0;
      clients.forEach(c=>{
        (c.orders || []).forEach(o=>{
          if(o.date >= fromDate && o.date <= toDate && (o.total || 0) > 0){
            orderCount++;
            total += (o.total || 0);
          }
        });
      });
      const rangeLabel = fromDate === toDate ? fromDate : `${fromDate} עד ${toDate}`;
      const report = `דוח כל התיקיות: ${rangeLabel}\nכמות הזמנות חדשות: ${orderCount}\nסכום: ₪${total.toFixed(2)}`;
      let waNumber = '052-3617178'.replace(/\D/g, '');
      if(waNumber.startsWith('0')) waNumber = '972' + waNumber.slice(1);
      window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(report)}`, '_blank');
    });
  }

  function renderSearchResults(){
    const box = document.getElementById('searchResults');
    const q = normalizeSearchText(document.getElementById('searchBox').value);
    box.innerHTML = "";
    if(!q) return;
    const matches = clients.filter(c => matchesSearch(c, q));
    if(matches.length === 0){
      box.innerHTML = `<div class="empty" style="padding:8px 4px">לא נמצאו כתובות מתאימות.</div>`;
      return;
    }
    matches.forEach(c=>{
      box.appendChild(buildClientCard(c, null, null, true));
    });
  }

  function renderFolders(){
    const listEl = document.getElementById('folderList');
    listEl.innerHTML = "";

    if(folders.length === 0 && clients.length === 0){
      listEl.innerHTML = `<div class="empty">אין עדיין תיקיות. הוסיפו תיקייה (למשל שם עיר או אזור) ואז שבצו כתובות אליה.</div>`;
      return;
    }

    const folderSearchQ = normalizeSearchText(document.getElementById('folderSearchBox').value);
    const visibleFolders = folderSearchQ
      ? folders.filter(f => normalizeSearchText(f.name).includes(folderSearchQ))
      : folders;

    let anyVisible = false;

    visibleFolders.forEach(folder=>{
      const name = folder.name;
      const members = clients.filter(c=> (c.folder||"") === name || c.tempFolder === name);
      const routeActive = selectedFolderForRoute === name;
      const group = document.createElement('div');
      group.className = 'cluster-group';
      group.draggable = true;
      group.dataset.folderName = name;
      group.addEventListener('dragstart', ()=>{ group.classList.add('dragging'); });
      group.addEventListener('dragend', ()=>{ group.classList.remove('dragging'); });

      const head = document.createElement('div');
      head.className = 'cluster-head';
      const mapVisible = folder.mapVisible !== false; // default true for folders created before this feature
      head.innerHTML = `
        <input type="color" class="folder-swatch" value="${folder.color}" title="שינוי צבע התיקייה">
        <div class="name">${escapeHtml(name)}</div>
        <div class="count">${members.length}</div>
        <button class="map-visibility-toggle ${mapVisible ? '' : 'off'}" title="${mapVisible ? 'הסתר את כל התיקייה מהמפה (למשל אם היום לא רלוונטית)' : 'הצג שוב את התיקייה על המפה'}">${mapVisible ? '👁' : '🚫'}</button>
        <button class="route-toggle ${routeActive ? 'active' : ''}" title="הצג/הסתר מסלול נסיעה על המפה">🧭</button>
        <button class="rename-folder" title="שינוי שם התיקייה">✎</button>
        <button class="folder-del" title="מחיקת תיקייה (הכתובות לא יימחקו)">✕</button>
      `;
      const swatchInput = head.querySelector('.folder-swatch');
      swatchInput.addEventListener('click', e=> e.stopPropagation());
      swatchInput.addEventListener('change', (e)=>{
        folder.color = e.target.value;
        saveFolders();
        renderAll();
      });
      head.addEventListener('click', (e)=>{
        if(e.target.closest('.folder-del') || e.target.closest('.folder-swatch') || e.target.closest('.route-toggle') || e.target.closest('.rename-folder') || e.target.closest('.map-visibility-toggle')) return;
        toggleFolderOpen(name);
        toggleAnimatedCollapse(body, null);
        if(members.length){
          const bounds = members.map(c=>[c.lat, c.lon]);
          fitOrCenter(bounds, 14, 40);
        }
      });
      head.querySelector('.map-visibility-toggle').addEventListener('click', (e)=>{
        e.stopPropagation();
        folder.mapVisible = !mapVisible;
        if(!folder.mapVisible && selectedFolderForRoute === name) selectedFolderForRoute = null;
        saveFolders();
        renderAll();
      });
      head.querySelector('.route-toggle').addEventListener('click', (e)=>{
        e.stopPropagation();
        selectedFolderForRoute = routeActive ? null : name;
        openFolderNames.add(name); // open the group so the numbering is visible right away
        renderAll();
      });
      head.querySelector('.rename-folder').addEventListener('click', (e)=>{
        e.stopPropagation();
        startFolderRename(head, folder);
      });
      head.querySelector('.folder-del').addEventListener('click', (e)=>{
        e.stopPropagation();
        deleteFolder(name);
      });

      const body = document.createElement('div');
      body.className = 'cluster-body animated-collapse';
      if(openFolderNames.has(name)){
        body.classList.add('is-open');
        body.style.maxHeight = 'none'; // reflecting existing state on render, not an animated user action
      }
      if(members.length === 0){
        body.innerHTML = `<div class="empty" style="padding:10px 4px">אין עדיין כתובות בתיקייה הזו. השתמשו בתפריט "העברה לתיקייה" בכרטיס של כל לקוח.</div>`;
      } else {
        const activeMembers = members.filter(c => !c.skipRoute);
        const skippedMembers = members.filter(c => c.skipRoute);

        // ordering (numbers + ▲▼ + drag) is always available, whether or not 🧭 is on -
        // 🧭 only decides whether the connecting route line is drawn on the map
        const orderedMembers = sinkInactiveToEnd(getOrderedFolderMembers(folder, activeMembers), c => c.inactive); // full list, for display/position
        const calcMembers = orderedMembers.filter(c => !c.handled); // for route distance/time only
        const cachedRoad = roadRouteCache[folder.name];
        const roadMatches = cachedRoad && cachedRoad.fingerprint === routeFingerprint(calcMembers);

        if(routeActive && calcMembers.length > 1){
          let totalKm, totalDriveMin, isReal;
          if(roadMatches){
            totalKm = cachedRoad.totalKm; totalDriveMin = cachedRoad.totalMin; isReal = true;
          } else {
            totalKm = 0; totalDriveMin = 0; isReal = false;
            for(let i=0; i<calcMembers.length-1; i++){
              const leg = estimateLeg(calcMembers[i], calcMembers[i+1]);
              totalKm += leg.km;
              totalDriveMin += leg.minutes;
            }
          }
          const totalServiceMin = calcMembers.length * STOP_SERVICE_MINUTES;
          const totalMin = totalDriveMin + totalServiceMin;
          const summary = document.createElement('div');
          summary.className = 'route-summary';
          summary.title = (isReal
            ? "מרחק אמיתי על פי הכביש (מקור: OSRM), זמן מחושב לפי 20 קמ״ש בגלל עומסים"
            : "מאתר את המסלול בפועל על פי הכביש... (מציג הערכה בקו אווירי בינתיים)")
            + ` + ${STOP_SERVICE_MINUTES} דק׳ טיפול בכל כתובת (${calcMembers.length} כתובות)`;
          const excludedCount = skippedMembers.length + (orderedMembers.length - calcMembers.length);
          summary.innerHTML = `🚗 סה״כ מסלול: <b>${totalKm.toFixed(1)} ק״מ</b> · ${formatDuration(totalDriveMin)} נסיעה + ${formatDuration(totalServiceMin)} טיפול (${calcMembers.length}×${STOP_SERVICE_MINUTES} דק׳) = <b>${formatDuration(totalMin)}</b>${isReal ? '' : ' <span style="opacity:.7">(הערכה, מאתר מסלול מדויק...)</span>'}${excludedCount ? ` <span style="opacity:.7">· ${excludedCount} כתובות מדולגות/טופלו, לא נכללות</span>` : ''}`;
          body.appendChild(summary);
        }

        const activeListEl = document.createElement('div');
        body.appendChild(activeListEl);

        orderedMembers.forEach((c, idx)=>{
          const moveHandlers = {
            isFirst: idx === 0,
            isLast: idx === orderedMembers.length - 1,
            total: orderedMembers.length,
            up: () => moveFolderMember(folder, activeMembers, c.id, -1, skippedMembers),
            down: () => moveFolderMember(folder, activeMembers, c.id, 1, skippedMembers),
            moveTo: (pos) => moveFolderMemberToPosition(folder, activeMembers, c.id, pos, skippedMembers)
          };
          const cardEl = buildClientCard(c, idx+1, moveHandlers, true, (c.folder||"") !== name && c.tempFolder === name);
          if(idx % 2 === 1) cardEl.classList.add('card-alt');
          if(routeActive && !c.handled){
            const serviceTag = document.createElement('div');
            serviceTag.className = 'service-time-tag';
            serviceTag.textContent = `⏱️ ${STOP_SERVICE_MINUTES} דק׳ טיפול בכתובת זו`;
            cardEl.appendChild(serviceTag);
          }
          activeListEl.appendChild(cardEl);
          if(idx < orderedMembers.length - 1){
            const nextC = orderedMembers[idx+1];
            if(!c.handled && !nextC.handled){
              const curCalcPos = calcMembers.indexOf(c);
              const realLeg = (roadMatches && cachedRoad.legs[curCalcPos]) ? cachedRoad.legs[curCalcPos] : null;
              activeListEl.appendChild(buildLegConnector(c, nextC, realLeg));
            }
          }
        });
        wireDragReorder(activeListEl, (ids)=>{
          folder.order = ids.concat(skippedMembers.map(c => c.id));
          saveFolders();
          renderFolders();
          renderFolderRoute();
        });

        if(skippedMembers.length){
          const skipHeader = document.createElement('div');
          skipHeader.style.cssText = 'font-size:.72rem;color:rgba(255,255,255,.5);margin:10px 0 4px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.18)';
          skipHeader.textContent = `⏸ לא במסלול היום (${skippedMembers.length})`;
          body.appendChild(skipHeader);
          skippedMembers.forEach(c=>{
            body.appendChild(buildClientCard(c, null, null, true, (c.folder||"") !== name && c.tempFolder === name));
          });
        }

        // total of all "last invoice" amounts entered for a chosen day, across every
        // client in this folder (active and skipped alike)
        const invoiceSummary = document.createElement('div');
        invoiceSummary.className = 'invoice-summary';
        const today = localDateString();
        invoiceSummary.innerHTML = `
          <input type="date" class="invoice-summary-date" value="${today}">
          <div class="invoice-summary-total">סה״כ חשבוניות: <b>₪0</b></div>
        `;
        const summaryDateInput = invoiceSummary.querySelector('.invoice-summary-date');
        const summaryTotalEl = invoiceSummary.querySelector('.invoice-summary-total b');
        function refreshInvoiceSummary(){
          const chosenDate = summaryDateInput.value;
          const total = members.reduce((sum, m)=>{
            if(m.lastInvoiceDate === chosenDate){
              const val = parseFloat(m.lastInvoice);
              if(!isNaN(val)) return sum + val;
            }
            return sum;
          }, 0);
          summaryTotalEl.textContent = `₪${total.toFixed(2)}`;
        }
        summaryDateInput.addEventListener('click', e=>e.stopPropagation());
        summaryDateInput.addEventListener('change', refreshInvoiceSummary);
        refreshInvoiceSummary();
        body.appendChild(invoiceSummary);

        const folderReportBtn = document.createElement('button');
        folderReportBtn.className = 'send-daily-report-btn';
        folderReportBtn.textContent = '📤 שליחת דו״ח יומי';
        folderReportBtn.addEventListener('click', (e)=>{
          e.stopPropagation();
          const chosenDate = summaryDateInput.value;
          let orderCount = 0;
          let total = 0;
          members.forEach(m=>{
            (m.orders || []).forEach(o=>{
              if(o.date === chosenDate && (o.total || 0) > 0){
                orderCount++;
                total += (o.total || 0);
              }
            });
          });
          const report = `דוח יומי - תיקיית ${name}: ${chosenDate}\nכמות הזמנות חדשות: ${orderCount}\nסכום: ₪${total.toFixed(2)}`;
          let waNumber = '052-3617178'.replace(/\D/g, '');
          if(waNumber.startsWith('0')) waNumber = '972' + waNumber.slice(1);
          window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(report)}`, '_blank');
        });
        body.appendChild(folderReportBtn);
      }

      group.appendChild(head);
      group.appendChild(body);
      listEl.appendChild(group);
      if(members.length) anyVisible = true;
    });

    // unassigned bucket
    const unassigned = folderSearchQ ? [] : clients.filter(c=> !(c.folder||""));
    if(unassigned.length){
      anyVisible = true;
      const UNASSIGNED_KEY = "__unassigned__";
      const unassignedRouteActive = selectedFolderForRoute === UNASSIGNED_KEY;
      const group = document.createElement('div');
      group.className = 'cluster-group';
      const head = document.createElement('div');
      head.className = 'cluster-head';
      head.innerHTML = `
        <div class="cluster-swatch" style="background:var(--muted)"></div>
        <div class="name">בלי תיקייה</div>
        <div class="count">${unassigned.length}</div>
        <button class="map-visibility-toggle ${unassignedMapVisible ? '' : 'off'}" title="${unassignedMapVisible ? 'הסתר את הקבוצה הזו מהמפה' : 'הצג שוב את הקבוצה הזו על המפה'}">${unassignedMapVisible ? '👁' : '🚫'}</button>
        <button class="route-toggle ${unassignedRouteActive ? 'active' : ''}" title="הצג/הסתר מסלול נסיעה על המפה">🧭</button>
        <button class="rename-folder" title="לקבוצה הזו אין שם לשנות - היא אוספת אוטומטית כל לקוח בלי תיקייה">✎</button>
        <button class="folder-del" title="אי אפשר למחוק את הקבוצה הזו - היא לא תיקייה אמיתית, רק שייכו כל לקוח לתיקייה כדי שהוא ייעלם ממנה">✕</button>
      `;
      const body = document.createElement('div');
      body.className = 'cluster-body animated-collapse';
      if(openFolderNames.has(UNASSIGNED_KEY)){
        body.classList.add('is-open');
        body.style.maxHeight = 'none';
      }
      head.addEventListener('click', (e)=>{
        if(e.target.closest('.folder-del') || e.target.closest('.route-toggle') || e.target.closest('.rename-folder') || e.target.closest('.map-visibility-toggle')) return;
        toggleFolderOpen(UNASSIGNED_KEY);
        toggleAnimatedCollapse(body, null);
        const bounds = unassigned.map(c=>[c.lat, c.lon]);
        fitOrCenter(bounds, 14, 40);
      });
      head.querySelector('.map-visibility-toggle').addEventListener('click', (e)=>{
        e.stopPropagation();
        unassignedMapVisible = !unassignedMapVisible;
        if(!unassignedMapVisible && selectedFolderForRoute === UNASSIGNED_KEY) selectedFolderForRoute = null;
        renderAll();
      });
      head.querySelector('.route-toggle').addEventListener('click', (e)=>{
        e.stopPropagation();
        selectedFolderForRoute = unassignedRouteActive ? null : UNASSIGNED_KEY;
        openFolderNames.add(UNASSIGNED_KEY);
        renderAll();
      });
      head.querySelector('.rename-folder').addEventListener('click', (e)=>{
        e.stopPropagation();
        alert('לקבוצה הזו אין שם לשנות - היא אוספת אוטומטית כל לקוח שאין לו תיקייה.');
      });
      head.querySelector('.folder-del').addEventListener('click', (e)=>{
        e.stopPropagation();
        alert('אי אפשר למחוק את הקבוצה הזו - היא לא תיקייה אמיתית. שייכו כל לקוח לתיקייה דרך עריכת הכרטיס שלו, וכשלא יישאר אף לקוח בלי תיקייה, הקבוצה תיעלם מהתצוגה.');
      });
      unassigned.forEach(c=> body.appendChild(buildClientCard(c)));
      group.appendChild(head);
      group.appendChild(body);
      listEl.appendChild(group);
    }

    if(!anyVisible && folders.length === 0){
      listEl.innerHTML = `<div class="empty">אין עדיין תיקיות. הוסיפו תיקייה (למשל שם עיר או אזור) ואז שבצו כתובות אליה.</div>`;
    } else if(!anyVisible && folderSearchQ){
      listEl.innerHTML = `<div class="empty">לא נמצאו תיקיות שתואמות את החיפוש.</div>`;
    }
  }

  function renderAll(){
    if(expireHandledStatuses()) saveData();
    computeClusters();
    const bounds = renderMap();
    renderSidebar();
    renderFolders();
    renderGrandInvoiceSummary();
    renderSearchResults();
    populateFolderSelect();
    renderFolderRoute();
    return bounds;
  }

  function candidateIcon(num){
    const color = '#C79A2E';
    const svg = `<svg width="26" height="34" viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 0C5.82 0 0 5.82 0 13c0 9.75 13 21 13 21s13-11.25 13-21C26 5.82 20.18 0 13 0z" fill="${color}" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="2,2"/>
      <circle cx="13" cy="13" r="6.5" fill="#ffffff"/>
      <text x="13" y="16.8" text-anchor="middle" font-size="9" font-weight="700" font-family="Arial, sans-serif" fill="#12242C">${num}</text>
    </svg>`;
    return L.divIcon({
      html: svg, className:'', iconSize:[26,34], iconAnchor:[13,34], popupAnchor:[0,-30]
    });
  }

  function clearSuggestions(){
    document.getElementById('addrSuggestions').classList.remove('open');
    document.getElementById('addrSuggestions').innerHTML = "";
    document.getElementById('suggestHint').style.display = 'none';
    candidatesLayer.clearLayers();
  }

  function showSuggestions(results, isAmbiguousAdd){
    const box = document.getElementById('addrSuggestions');
    box.innerHTML = "";
    candidatesLayer.clearLayers();
    const bounds = [];

    results.forEach((item, idx)=>{
      const num = idx+1;
      const row = document.createElement('div');
      row.className = 'suggestion-item';
      row.innerHTML = `<div class="num">${num}</div>
        <div class="txt"><div class="main">${escapeHtml(item.label)}</div><div class="sub">${escapeHtml(item.display_name)}</div></div>`;
      row.addEventListener('click', ()=> selectSuggestion(item));
      box.appendChild(row);

      const marker = L.marker([item.lat, item.lon], { icon: candidateIcon(num) });
      marker.on('click', ()=> selectSuggestion(item));
      marker.addTo(candidatesLayer);
      bounds.push([item.lat, item.lon]);
    });

    box.classList.add('open');
    document.getElementById('suggestHint').style.display = isAmbiguousAdd ? 'block' : 'none';
    fitOrCenter(bounds, 15, 60);
  }

  function currentAddressQuery(){
    const street = document.getElementById('f-street').value.trim();
    const houseNumber = document.getElementById('f-housenum').value.trim();
    const city = document.getElementById('f-city').value.trim();
    const streetParam = [street, houseNumber].filter(Boolean).join(" ");
    return { street: streetParam, city, streetParam, query: [ streetParam, city ].filter(Boolean).join(", ") };
  }

  // inserts a house number (display-only, never sent to the geocoder) right after the
  // street portion of an already-resolved address label, e.g. "הרצל, נהריה" + "12" -> "הרצל 12, נהריה"
  // if someone typed the house number as part of the street text (e.g. "הרצל 12"),
  // pull the trailing number out so it lands in the dedicated number field instead
  function splitTrailingHouseNumber(streetEl, houseNumEl){
    const match = streetEl.value.trim().match(/^(.*?)\s+(\d+[א-ת]?(?:\/\d+)?)$/);
    if(!match) return;
    const [, streetOnly, number] = match;
    if(!streetOnly) return; // don't split if there'd be nothing left as the street name
    streetEl.value = streetOnly;
    if(!houseNumEl.value.trim()) houseNumEl.value = number; // don't clobber a number already typed there
  }

  function insertHouseNumber(address, houseNumber){
    const num = (houseNumber || "").trim();
    if(!num) return address;
    if(address.includes(num)) return address; // geocoder already found and included this number - don't duplicate it
    const idx = address.indexOf(",");
    if(idx === -1) return `${address} ${num}`;
    return `${address.slice(0, idx)} ${num}${address.slice(idx)}`;
  }

  // builds a signature for an order so that accidental duplicates (created e.g.
  // by a double-click on "save") can be detected: same date, same total, same
  // items (regardless of order), same no-order status
  function orderSignature(o){
    const itemsPart = (o.items || [])
      .map(it => `${it.name}:${it.qty}`)
      .sort()
      .join('|');
    return `${o.date}__${(o.total||0).toFixed(2)}__${o.noOrder ? 1 : 0}__${itemsPart}`;
  }

  function cleanupDuplicateOrders(){
    let totalRemoved = 0;
    let clientsAffected = 0;
    const preview = [];
    clients.forEach(c=>{
      if(!c.orders || c.orders.length < 2) return;
      const seen = new Set();
      const kept = [];
      let removedHere = 0;
      c.orders.forEach(o=>{
        const sig = orderSignature(o);
        if(seen.has(sig)){
          removedHere++;
          recentlyDeletedOrderIds.add(o.id); // guard against the merge-safe save resurrecting it
        } else {
          seen.add(sig);
          kept.push(o);
        }
      });
      if(removedHere > 0){
        preview.push(`${c.business || c.name || c.id}: ${removedHere} כפילויות`);
        c.orders = kept;
        totalRemoved += removedHere;
        clientsAffected++;
      }
    });

    if(totalRemoved === 0){
      alert('לא נמצאו הזמנות כפולות.');
      return;
    }

    const ok = confirm(
      `נמצאו ${totalRemoved} הזמנות כפולות ב-${clientsAffected} לקוחות:\n\n` +
      preview.join('\n') +
      `\n\nלמחוק את הכפילויות ולהשאיר רק הזמנה אחת מכל אחת? לא ניתן לשחזר את זה.`
    );
    if(!ok){
      // user backed out - reload the untouched data instead of saving the trimmed version
      loadData().then(renderAll);
      return;
    }
    saveData();
    renderAll();
    alert(`נמחקו ${totalRemoved} הזמנות כפולות בהצלחה.`);
  }

  // smoothly animates a collapsible section open/closed via max-height, instead
  // of abruptly toggling display:none/block - measures actual content height so
  // it works correctly regardless of how much content is inside
  function toggleAnimatedCollapse(bodyEl, chevronEl){
    const isOpen = bodyEl.classList.contains('is-open');
    if(isOpen){
      // closing: lock in the current height first, then animate down to 0
      bodyEl.style.maxHeight = bodyEl.scrollHeight + 'px';
      void bodyEl.offsetHeight; // force reflow so this starting value is registered
      requestAnimationFrame(()=>{
        bodyEl.classList.remove('is-open');
        requestAnimationFrame(()=>{ bodyEl.style.maxHeight = '0px'; });
      });
      if(chevronEl) chevronEl.style.transform = 'rotate(0deg)';
    } else {
      // opening: explicitly commit the starting point (0) and force a reflow
      // before setting the target - otherwise the browser can sometimes skip
      // straight to the final state instead of animating the transition
      const targetHeight = bodyEl.scrollHeight;
      bodyEl.style.maxHeight = '0px';
      void bodyEl.offsetHeight;
      bodyEl.classList.add('is-open');
      bodyEl.style.maxHeight = targetHeight + 'px';
      if(chevronEl) chevronEl.style.transform = 'rotate(90deg)';
      // release the max-height constraint once the transition should be done -
      // using a timer (not just transitionend) as the primary mechanism, so the
      // content never stays permanently clipped/stuck if the transition event
      // doesn't fire for any reason (this was breaking scrolling for some folders)
      let released = false;
      const release = ()=>{
        if(released) return;
        released = true;
        if(bodyEl.classList.contains('is-open')) bodyEl.style.maxHeight = 'none';
        bodyEl.removeEventListener('transitionend', onEnd);
      };
      const onEnd = (e)=>{ if(e.propertyName === 'max-height') release(); };
      bodyEl.addEventListener('transitionend', onEnd);
      setTimeout(release, 750); // slightly longer than the .65s CSS transition
    }
  }

  // one-time fill-in: any existing client that doesn't have a preset WhatsApp
  // message yet gets the current default, so this doesn't have to be entered
  // one by one - new clients already get it automatically via the add-client form
  function backfillDefaultWhatsappMessages(){
    let changed = false;
    clients.forEach(c=>{
      if(!c.whatsappMessage || c.whatsappMessage === OLD_DEFAULT_WHATSAPP_MESSAGE_0 || c.whatsappMessage === OLD_DEFAULT_WHATSAPP_MESSAGE || c.whatsappMessage === OLD_DEFAULT_WHATSAPP_MESSAGE_2 || c.whatsappMessage === OLD_DEFAULT_WHATSAPP_MESSAGE_3 || c.whatsappMessage === OLD_DEFAULT_WHATSAPP_MESSAGE_4 || c.whatsappMessage === OLD_DEFAULT_WHATSAPP_MESSAGE_5){
        c.whatsappMessage = DEFAULT_WHATSAPP_MESSAGE;
        changed = true;
      }
    });
    if(changed) saveData();
    return changed;
  }

  (async function init(){
    await Promise.all([loadData(), loadFolders(), loadClusterNames(), loadClusterOrder(), loadVehicleStockBaseline()]);
    backfillDefaultWhatsappMessages();
    openFolderNames.clear();
    openClusterNames.clear();
    const bounds = renderAll();
    // belt-and-suspenders: force every folder/cluster body closed on first load,
    // no matter what caused it to render open
    document.querySelectorAll('#folderList .cluster-body').forEach(b => { b.classList.remove('is-open'); b.style.maxHeight = '0px'; });
    if(clients.length){
      try{ fitOrCenter(bounds, 14, 40); }catch(e){}
    }
    openDeepLinkedClientIfAny();
  })();

  // if the URL contains ?client=<id>, jump straight to that client: open its
  // folder, expand its card, and open the order-history popup automatically -
  // this is what the "share card" links point to
  function openDeepLinkedClientIfAny(){
    const params = new URLSearchParams(window.location.search);
    const clientId = params.get('client');
    if(!clientId) return;
    const c = clients.find(cl => cl.id === clientId);
    if(!c){
      alert('הלקוח שהקישור מצביע אליו לא נמצא (אולי נמחק).');
      return;
    }
    if(c.folder) openFolderNames.add(c.folder);
    if(c.tempFolder) openFolderNames.add(c.tempFolder);
    openClientCards.add(c.id);
    renderAll();
    setTimeout(()=>{
      const cardEl = document.querySelector(`.client-card[data-client-id="${CSS.escape(c.id)}"]`);
      if(cardEl) cardEl.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 300);
  }

  // the decorative mole "burrows" into its hole as the sidebar scrolls: the character
  // sinks straight DOWN inside its clip box (never upward, so it can't cover the ☰ menu)
  // and fades out — leaving a clean top line with the map. Back at the top it re-emerges.
  (function wireMoleBurrow(){
    const scrollEl = document.querySelector('.sidebar .scroll');
    const wrap = document.querySelector('.sidebar > .mole-deco');
    if(!scrollEl || !wrap) return;
    const back = wrap.querySelector('.mole-back');
    const frontDirt = wrap.querySelector('.mole-front-dirt');
    scrollEl.addEventListener('scroll', ()=>{
      const st = scrollEl.scrollTop;
      // the wrap tracks the card as it scrolls; the mole sinks into the hole and BOTH the mole
      // and the FRONT dirt copy fade out — leaving only the back dirt (a real child of the card,
      // which scrolls & clips exactly with it). This gives "dirt in front" without any float.
      wrap.style.transform = 'translateY(' + (-st) + 'px)';
      if(back){
        // the mole stays fully opaque and simply SINKS into the hole (clipped away) — no fade
        back.style.transform = 'translateY(' + Math.min(st * 6, 150) + 'px)';
      }
      if(frontDirt) frontDirt.style.opacity = Math.max(0, 1 - st / 18);
    }, { passive:true });
  })();


})();
